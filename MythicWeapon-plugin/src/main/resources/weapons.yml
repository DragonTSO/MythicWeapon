      - ""
      - "&c❖ Passive: &fTime Bomb &7(mỗi 3 đòn)"
      - "  &73 đòn liên tiếp → &6💣 Bom hẹn giờ 3s"
      - "  &7Phát nổ gây &c12 damage"
      - ""
      - "&b❖ Active: &fDemo Blast &7[Right-Click]"
      - "  &7Bán kính &e15 block&7:"
      - "  &7  • Địch → &cSlowness X &7(7s)"
      - "  &7  • Nổ đất đá trực quan"
      - "  &7  • Đồng đội → &a+10% damage &7(2s)"
      - ""
      - "&6Cooldown: &f30s"
      - "&5Hợp cho: &dControl / Support"

